<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 DDR - 사쿠란보 리믹스 | 리듬 게임</title>
  <meta name="description" content="화살표 키를 눌러 비트에 맞춰 춤추는 DDR 리듬 게임! 사쿠란보 리믹스 버전">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════════════════════════════════ -->
  <!--               TITLE SCREEN            -->
  <!-- ══════════════════════════════════════ -->
  <section id="screen-title" class="screen active" aria-label="타이틀 화면">
    <div class="bg-orbs">
      <div class="orb" id="orb1"></div>
      <div class="orb" id="orb2"></div>
      <div class="orb" id="orb3"></div>
      <div class="orb" id="orb4"></div>
    </div>

    <div class="title-card">
      <!-- Animated Arrow Preview -->
      <div class="arrow-preview" aria-hidden="true">
        <span class="arr arr-l">←</span>
        <span class="arr arr-d">↓</span>
        <span class="arr arr-u">↑</span>
        <span class="arr arr-r">→</span>
      </div>

      <h1 id="game-logo" class="game-logo">DDR</h1>
      <p class="game-subtitle">さくらんぼ · 리듬 게임</p>

      <!-- Controls Guide -->
      <div class="controls-grid">
        <div class="ctrl-box">
          <div class="ctrl-keys">
            <kbd>←</kbd><kbd>↓</kbd><kbd>↑</kbd><kbd>→</kbd>
          </div>
          <span class="ctrl-label">화살표 키</span>
        </div>
        <div class="ctrl-divider">또는</div>
        <div class="ctrl-box">
          <div class="ctrl-keys">
            <kbd>A</kbd><kbd>S</kbd><kbd>W</kbd><kbd>D</kbd>
          </div>
          <span class="ctrl-label">WASD 키</span>
        </div>
      </div>

      <!-- Difficulty -->
      <div class="difficulty-row" role="group" aria-label="난이도 선택">
        <button id="diff-easy"   class="diff-btn" data-diff="easy">EASY</button>
        <button id="diff-normal" class="diff-btn selected" data-diff="normal">NORMAL</button>
        <button id="diff-hard"   class="diff-btn" data-diff="hard">HARD</button>
      </div>

      <button id="btn-start" class="start-btn">
        <span class="start-icon">▶</span>
        SPACE · 클릭으로 시작
      </button>

      <p class="highscore-display">
        최고 점수 : <span id="best-score">---</span>
      </p>
    </div>
  </section>

  <!-- ══════════════════════════════════════ -->
  <!--               GAME SCREEN             -->
  <!-- ══════════════════════════════════════ -->
  <section id="screen-game" class="screen" aria-label="게임 화면">
    <div class="game-container">

      <!-- Left Sidebar -->
      <aside class="game-sidebar game-sidebar-left">
        <div class="sidebar-stat">
          <div class="sidebar-label">SCORE</div>
          <div id="hud-score" class="sidebar-value score-val" aria-live="polite">0000000</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label">COMBO</div>
          <div id="hud-combo" class="sidebar-value combo-val" aria-live="polite">0</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label">LIFE</div>
          <div class="life-bar-wrap">
            <div id="life-bar-fill" class="life-bar-fill"></div>
          </div>
          <div id="life-num" class="life-num">50%</div>
        </div>
      </aside>

      <!-- Canvas Area -->
      <div class="canvas-wrapper">
        <canvas id="game-canvas" width="480" height="700" aria-label="게임 캔버스"></canvas>

        <!-- Judgment Text Overlay -->
        <div id="judgment-text" class="judgment-text" aria-live="polite" aria-atomic="true"></div>

        <!-- Countdown Overlay -->
        <div id="countdown-overlay" class="countdown-overlay hidden">
          <div id="countdown-num" class="countdown-num">3</div>
        </div>

        <!-- Pause Overlay -->
        <div id="pause-overlay" class="pause-overlay hidden" role="dialog" aria-label="일시정지">
          <h2 class="pause-title">PAUSED</h2>
          <button id="btn-resume" class="btn-secondary">▶ 계속하기 (ESC)</button>
          <button id="btn-quit" class="btn-danger">✖ 메뉴로 나가기</button>
        </div>
      </div>

      <!-- Right Sidebar -->
      <aside class="game-sidebar game-sidebar-right">
        <div class="sidebar-stat">
          <div class="sidebar-label perfect-color">PERFECT</div>
          <div id="hud-perfect" class="sidebar-value perfect-color">0</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label great-color">GREAT</div>
          <div id="hud-great" class="sidebar-value great-color">0</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label good-color">GOOD</div>
          <div id="hud-good" class="sidebar-value good-color">0</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label bad-color">BAD</div>
          <div id="hud-bad" class="sidebar-value bad-color">0</div>
        </div>
        <div class="sidebar-stat">
          <div class="sidebar-label miss-color">MISS</div>
          <div id="hud-miss" class="sidebar-value miss-color">0</div>
        </div>

        <!-- Song Progress Bar (vertical) -->
        <div class="song-prog-wrap" aria-label="노래 진행도">
          <div id="song-prog-fill" class="song-prog-fill"></div>
        </div>

        <p class="pause-hint">ESC = 일시정지</p>
      </aside>
    </div>
  </section>

  <!-- ══════════════════════════════════════ -->
  <!--              RESULT SCREEN            -->
  <!-- ══════════════════════════════════════ -->
  <section id="screen-result" class="screen" aria-label="결과 화면">
    <div class="bg-orbs">
      <div class="orb orb-result1"></div>
      <div class="orb orb-result2"></div>
    </div>

    <div class="result-card">
      <div id="result-grade-display" class="grade-display" aria-label="등급">S</div>
      <h2 class="result-heading">RESULT</h2>

      <div class="result-stats-grid">
        <div class="rst-row">
          <span class="rst-label perfect-color">✦ PERFECT</span>
          <span id="rst-perfect" class="rst-val">0</span>
        </div>
        <div class="rst-row">
          <span class="rst-label great-color">✦ GREAT</span>
          <span id="rst-great" class="rst-val">0</span>
        </div>
        <div class="rst-row">
          <span class="rst-label good-color">✦ GOOD</span>
          <span id="rst-good" class="rst-val">0</span>
        </div>
        <div class="rst-row">
          <span class="rst-label bad-color">✦ BAD</span>
          <span id="rst-bad" class="rst-val">0</span>
        </div>
        <div class="rst-row">
          <span class="rst-label miss-color">✦ MISS</span>
          <span id="rst-miss" class="rst-val">0</span>
        </div>
        <hr class="rst-divider">
        <div class="rst-row large">
          <span class="rst-label">SCORE</span>
          <span id="rst-score" class="rst-val highlight-score">0</span>
        </div>
        <div class="rst-row large">
          <span class="rst-label">MAX COMBO</span>
          <span id="rst-maxcombo" class="rst-val highlight-combo">0</span>
        </div>
        <div class="rst-row">
          <span class="rst-label">정확도</span>
          <span id="rst-accuracy" class="rst-val">0%</span>
        </div>
      </div>

      <div class="result-btns">
        <button id="btn-retry" class="start-btn">🔄 다시하기</button>
        <button id="btn-menu"  class="btn-secondary">메인 메뉴</button>
      </div>
    </div>
  </section>

  <script src="game.js?v=1.0.7"></script>
</body>
</html>
